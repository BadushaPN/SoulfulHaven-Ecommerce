<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="projectone">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>projectone</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      background-color: #ffffff;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: opacity 0.4s ease-out;
      z-index: 9999;
    }
    .loader {
      position: relative;
      width: 70px;
      height: 70px;
      margin-bottom: 25px;
    }
    .loader-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 4px solid transparent;
      animation: spin linear infinite;
    }
    .loader-ring:nth-child(1) {
      border-top-color: #4f46e5;
      border-bottom-color: #4f46e5;
      animation-duration: 0.7s;
      box-shadow: 0 0 12px rgba(79, 70, 229, 0.4);
    }
    .loader-ring:nth-child(2) {
      border-left-color: #06b6d4;
      border-right-color: #06b6d4;
      width: 76%;
      height: 76%;
      top: 12%;
      left: 12%;
      animation-duration: 0.4s;
      animation-direction: reverse;
      box-shadow: 0 0 10px rgba(6, 182, 212, 0.4);
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loading-text {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      background: linear-gradient(90deg, #4f46e5, #06b6d4, #4f46e5);
      background-size: 200% auto;
      color: #000;
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 1s linear infinite;
    }
    @keyframes shimmer {
      0% { background-position: 0% center; }
      100% { background-position: -200% center; }
    }
  </style>
</head>
<body>
  <div class="loading-container">
    <div class="loader">
      <div class="loader-ring"></div>
      <div class="loader-ring"></div>
    </div>
    <div class="loading-text">Soulful Haven</div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    window.addEventListener('load', function() {
      var loading = document.querySelector('.loading-container');
      
      // Observe when Flutter adds its view to the DOM
      var observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
          if (mutation.addedNodes) {
            for (var i = 0; i < mutation.addedNodes.length; i++) {
              var node = mutation.addedNodes[i];
              if (node.tagName === 'FLUTTER-VIEW' || node.tagName === 'FLT-GLASS-PANE') {
                // Fade out and remove loading indicator
                loading.style.opacity = '0';
                setTimeout(function() {
                  if (loading.parentNode) {
                    loading.parentNode.removeChild(loading);
                  }
                }, 500); // 500ms fade transition
                observer.disconnect();
              }
            }
          }
        });
      });
      
      observer.observe(document.body, { childList: true });
    });
  </script>
</body>
</html>
